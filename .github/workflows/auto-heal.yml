name: Auto-Healing Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Skip auto-heal commits to prevent infinite loops
    if: "!startsWith(github.event.head_commit.message, 'auto-heal')"

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-timeout

      - name: Run pytest
        id: run_tests
        run: python3 -m pytest tests/ -v --timeout=30 2>&1 | tee /tmp/pytest.log
        continue-on-error: true

      - name: Trigger Auto-Healing on test failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          LOG=$(cat /tmp/pytest.log | head -c 400000)
          curl -s -X POST https://washhouse-shopper-retry.ngrok-free.dev/tools/handle_build_failure \
            -H "Content-Type: application/json" \
            -d "{
              \"build_id\": \"${{ github.run_id }}\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"scenario\": \"A\",
              \"raw_log\": $(echo "$LOG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
            }"
          echo "Auto-healing triggered for RUNTIME failure!"

      - name: Find and fix ALL bug types
        run: pip install astroid 2>/dev/null || true

      - name: AI Logic Review on changed files
        if: steps.run_tests.outcome == 'success'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.py' 2>/dev/null || git diff --name-only HEAD -- '*.py' 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No Python files changed — skipping AI review."
            exit 0
          fi

          echo "Changed files: $CHANGED"
          BUG_FOUND=0
          SERVER="https://washhouse-shopper-retry.ngrok-free.dev"

          for FILE in $CHANGED; do
            [ ! -f "$FILE" ] && echo "Skipping $FILE (not found)" && continue

            echo "--- AI review: $FILE ---"
            CODE=$(cat "$FILE")

            # --max-time 60: prevents one slow review from blocking the whole step
            HTTP_CODE=$(curl -s -o /tmp/review_resp.json -w "%{http_code}" \
              --max-time 60 \
              -X POST "$SERVER/tools/review_code" \
              -H "Content-Type: application/json" \
              -d "{
                \"file_path\": \"$FILE\",
                \"code\": $(echo "$CODE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
                \"repo\": \"${{ github.repository }}\",
                \"build_id\": \"review-${{ github.run_id }}\"
              }" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
              echo "⚠️  AI review server unreachable (network/ngrok down) — skipping $FILE"
              continue
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️  AI review server returned HTTP $HTTP_CODE for $FILE"
              continue
            fi

            RESPONSE=$(cat /tmp/review_resp.json)
            echo "Response: $RESPONSE"

            HAS_BUG=$(echo "$RESPONSE" | python3 -c \
              'import json,sys; d=json.load(sys.stdin); print(str(d.get("has_bug","false")).lower())' \
              2>/dev/null || echo "false")

            if [ "$HAS_BUG" = "true" ]; then
              DESC=$(echo "$RESPONSE" | python3 -c \
                'import json,sys; d=json.load(sys.stdin); print(d.get("description","logic bug detected"))' \
                2>/dev/null || echo "logic bug")
              FIX=$(echo "$RESPONSE" | python3 -c \
                'import json,sys; d=json.load(sys.stdin); print(d.get("fix",""))' \
                2>/dev/null || echo "")
              echo "::error file=$FILE::Logic bug: $DESC"
              [ -n "$FIX" ] && echo "  Suggested fix: $FIX"
              BUG_FOUND=1
            else
              echo "✓ $FILE — no logic bugs found"
            fi
          done

          if [ "$BUG_FOUND" -eq 1 ]; then
            echo "AI detected logic bug(s) — healing pipeline triggered."
            exit 1
          else
            echo "✓ All changed files passed AI logic review."
          fi
